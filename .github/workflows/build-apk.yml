name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @mercadopro/web build

      - name: Capacitor sync
        working-directory: apps/web
        run: cap sync android

      # Diagnóstico: ver qué SDK hay disponible y qué path generó cap sync
      - name: Debug environment
        run: |
          echo "=== ANDROID_HOME ===" && echo $ANDROID_HOME
          echo "=== SDK platforms ===" && ls $ANDROID_HOME/platforms 2>/dev/null || echo "ninguno"
          echo "=== Build tools ===" && ls $ANDROID_HOME/build-tools 2>/dev/null || echo "ninguno"
          echo "=== capacitor.settings.gradle ===" && cat apps/web/android/capacitor.settings.gradle
          echo "=== Cap android path exists ===" && ls apps/web/node_modules/@capacitor/android/capacitor 2>/dev/null || echo "NO EXISTE"
          echo "=== pnpm virtual store capacitor ===" && ls node_modules/.pnpm/ 2>/dev/null | grep capacitor || echo "ninguno en raiz"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Grant Gradle permissions
        run: chmod +x apps/web/android/gradlew

      - name: Build APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log; exit ${PIPESTATUS[0]}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MercadoPro-${{ github.run_number }}
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.run_number }}
          path: /tmp/gradle.log
          retention-days: 7
