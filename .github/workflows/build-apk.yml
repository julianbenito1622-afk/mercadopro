name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (requerido por Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 5. Instalar dependencias
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 6. Build del frontend (React → dist/)
      - name: Build web app
        run: pnpm --filter @mercadopro/web build

      # 7. Sincronizar Capacitor (copia dist/ → android/assets)
      - name: Capacitor sync
        working-directory: apps/web
        run: ./node_modules/.bin/cap sync android --inline

      # 8. Permisos Gradle
      - name: Grant Gradle permissions
        run: chmod +x apps/web/android/gradlew

      # 9. Build APK debug (listo para instalar sin firmar)
      - name: Build APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon

      # 10. Subir APK como artifact descargable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MercadoPro-${{ github.run_number }}
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
