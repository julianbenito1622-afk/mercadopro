name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (requerido por Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 5. Instalar Capacitor CLI global (evita problemas de permisos en Linux)
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # 6. Instalar dependencias del monorepo
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 7. Build del frontend (React → dist/)
      - name: Build web app
        run: pnpm --filter @mercadopro/web build

      # 8. Sincronizar Capacitor (copia dist/ → android/assets)
      - name: Capacitor sync
        working-directory: apps/web
        run: cap sync android

      # 9. Instalar Android SDK 35 + build-tools
      - name: Install Android SDK 35
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      # 10. Permisos Gradle
      - name: Grant Gradle permissions
        run: chmod +x apps/web/android/gradlew

      # 11. Build APK debug (listo para instalar sin firmar)
      - name: Build APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log; exit ${PIPESTATUS[0]}

      # 12. Subir APK como artifact descargable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MercadoPro-${{ github.run_number }}
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 13. Subir log de Gradle si falla (para diagnóstico)
      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.run_number }}
          path: /tmp/gradle.log
          retention-days: 7
